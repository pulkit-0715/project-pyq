<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Types - UPES PYQ Archive</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-primary: #f3f4f6;
            --text-secondary: #9ca3af;
            --accent-primary: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.15);
            --back-btn-bg: rgba(255, 255, 255, 0.05);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        body::before, body::after {
            content: ''; position: absolute; width: 300px; height: 300px; border-radius: 50%;
            background: var(--accent-primary); filter: blur(150px); opacity: 0.12; z-index: -1;
        }
        body::before { top: -50px; left: -50px; }
        body::after { bottom: 100px; right: -50px; }

        .container {
            width: 100%; max-width: 900px; padding: 40px 24px; text-align: center;
            flex-grow: 1; display: flex; flex-direction: column; justify-content: center;
        }

        header { margin-bottom: 48px; }

        h1 {
            font-size: 2.5rem; font-weight: 700; letter-spacing: -0.03em; margin-bottom: 8px;
            background: linear-gradient(135deg, #ffffff 0%, #a5b4fc 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .subtitle { font-size: 1.1rem; color: var(--text-secondary); }

        .types-container {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px; width: 100%; margin-bottom: 48px;
        }

        .type-card {
            background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 16px;
            padding: 32px 24px; cursor: pointer; transition: var(--transition);
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .type-card h3 { font-size: 1.3rem; font-weight: 600; color: var(--text-primary); }
        .type-card p { font-size: 0.85rem; color: var(--text-secondary); margin-top: 6px; }

        .type-card:hover {
            transform: translateY(-5px); border-color: var(--accent-primary);
            box-shadow: 0 10px 25px -5px var(--accent-glow), 0 0 15px 1px var(--accent-glow);
            background: rgba(255, 255, 255, 0.05);
        }

        .btn-container { display: flex; justify-content: center; }

        .btn-back {
            font-family: inherit; font-size: 0.95rem; font-weight: 600; padding: 12px 24px;
            border-radius: 12px; background-color: var(--back-btn-bg); color: var(--text-primary);
            border: 1px solid var(--card-border); cursor: pointer; transition: var(--transition);
            display: inline-flex; align-items: center; gap: 8px; text-decoration: none;
        }

        .btn-back:hover { background-color: rgba(255, 255, 255, 0.1); transform: translateY(-2px); }

        footer { width: 100%; padding: 24px; text-align: center; border-top: 1px solid var(--card-border); font-size: 0.9rem; color: var(--text-secondary); }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1 id="subjectTitle">Loading Subject...</h1>
            <p class="subtitle" id="semesterSubtitle">Semester --</p>
        </header>

        <main class="types-container">
            <div class="type-card" data-type="midsem">
                <h3>Mid Semester</h3>
                <p>View Mid-Term Papers</p>
            </div>
            <div class="type-card" data-type="endsem">
                <h3>End Semester</h3>
                <p>View End-Term Papers</p>
            </div>
            <div class="type-card" data-type="quiz">
                <h3>Quiz Papers</h3>
                <p>View Class Quizzes & Tests</p>
            </div>
        </main>

        <div class="btn-container">
            <a href="#" id="backBtn" class="btn-back">← Back to Subjects</a>
        </div>
    </div>

    <footer><p>Made for UPES Students</p></footer>

    <script>
        // Mapping URLs tokens cleanly to readable titles
        const subjectNames = {
            "maths1": "Advanced Engineering Mathematics 1",
            "physics": "Physics for Computer Sciences",
            "c-prog": "Programming in C",
            "dsa": "Data Structures and Algorithms (DSA)",
            "python": "Python Programming",
            "digital-electronics": "Digital Electronics",
            "maths2": "Advanced Engineering Mathematics 2",
            "dbms": "Database Management System (DBMS)",
            "discrete-structures": "Discrete Mathematical Structures",
            "oop": "Object-Oriented Programming (OOP)"
        };

        document.addEventListener('DOMContentLoaded', () => {
            // Read URL Params
            const params = new URLSearchParams(window.location.search);
            const sem = params.get('semester');
            const subCode = params.get('subject');

            // Format UI heading values
            const finalSubjectName = subjectNames[subCode] || subCode.toUpperCase();
            document.getElementById('subjectTitle').innerText = finalSubjectName;
            document.getElementById('semesterSubtitle').innerText = `Semester ${sem} Modules`;

            // Adjust backward routing safely back to correct static page structure
            document.getElementById('backBtn').href = `semester${sem}.html`;

            // Setup navigation redirects toward papers page targeting exam categories
            const cards = document.querySelectorAll('.type-card');
            cards.forEach(card => {
                card.addEventListener('click', () => {
                    const examType = card.getAttribute('data-type');
                    window.location.href = `papers.html?semester=${sem}&subject=${subCode}&type=${examType}`;
                });
            });
        });
    </script>
</body>
</html>
