<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UPES PYQ Archive</title>
    <!-- Google Fonts for Modern Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* CSS Variables for Consistent Modern Theme */
        :root {
            --bg-color: #0b0f19;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-primary: #f3f4f6;
            --text-secondary: #9ca3af;
            --accent-primary: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.15);
            --donate-btn: #ef4444;
            --submit-btn: #10b981;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Reset & Base Styles */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        /* Subtle Background Ambient Glows */
        body::before, body::after {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: var(--accent-primary);
            filter: blur(150px);
            opacity: 0.12;
            z-index: -1;
        }
        body::before { top: -50px; left: -50px; }
        body::after { bottom: 100px; right: -50px; }

        /* Container */
        .container {
            width: 100%;
            max-width: 1100px;
            padding: 40px 24px;
            text-align: center;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* Header Styles */
        header {
            margin-bottom: 48px;
        }

        h1 {
            font-size: 2.8rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #ffffff 0%, #a5b4fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 1.1rem;
            color: var(--text-secondary);
            font-weight: 400;
        }

        /* Semester Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
            width: 100%;
            margin-bottom: 48px;
        }

        /* Semester Cards */
        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 32px 24px;
            cursor: pointer;
            transition: var(--transition);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .card h3 {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text-primary);
            transition: var(--transition);
        }

        .card p {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-top: 6px;
        }

        /* Hover Animations & Glow Effects */
        .card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-primary);
            box-shadow: 0 10px 25px -5px var(--accent-glow), 
                        0 0 15px 1px var(--accent-glow);
            background: rgba(255, 255, 255, 0.05);
        }

        .card:hover h3 {
            color: #ffffff;
        }

        /* Active click effect */
        .card:active {
            transform: translateY(-2px);
        }

        /* Action Buttons Section */
        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 24px;
        }

        .btn {
            font-family: inherit;
            font-size: 0.95rem;
            font-weight: 600;
            padding: 14px 28px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-donate {
            background-color: rgba(239, 68, 68, 0.1);
            color: #f87171;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .btn-donate:hover {
            background-color: var(--donate-btn);
            color: #ffffff;
            box-shadow: 0 8px 20px rgba(239, 68, 68, 0.3);
            transform: translateY(-2px);
        }

        .btn-submit {
            background-color: rgba(16, 185, 129, 0.1);
            color: #34d399;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .btn-submit:hover {
            background-color: var(--submit-btn);
            color: #ffffff;
            box-shadow: 0 8px 20px rgba(16, 185, 129, 0.3);
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(0);
        }

        /* Footer */
        footer {
            width: 100%;
            padding: 24px;
            text-align: center;
            border-top: 1px solid var(--card-border);
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        /* Responsive Design Adjustments */
        @media (max-width: 640px) {
            h1 {
                font-size: 2.2rem;
            }
            .subtitle {
                font-size: 1rem;
            }
            .grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
            }
            .card {
                padding: 24px 16px;
            }
            .action-buttons {
                flex-direction: column;
                width: 100%;
            }
            .btn {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Header Section -->
        <header>
            <h1>UPES PYQ Archive</h1>
            <p class="subtitle">Free Previous Year Question Papers for UPES Students</p>
        </header>

        <!-- Semester Selection Grid -->
        <main class="grid" id="semesterGrid">
            <!-- JavaScript will populate the 8 semester cards dynamically here -->
        </main>

        <!-- Action Utility Buttons -->
        <div class="action-buttons">
            <button class="btn btn-donate" id="donateBtn">Donate ❤️</button>
            <button class="btn btn-submit" id="submitBtn">Submit Question Paper</button>
        </div>
    </div>

    <!-- Footer Section -->
    <footer>
        <p>Made for UPES Students</p>
    </footer>

    <!-- Vanilla JavaScript for Interaction functionality -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const gridContainer = document.getElementById('semesterGrid');
            
            // Loop to generate 8 semester cards programmatically to keep code DRY
            for (let i = 1; i <= 8; i++) {
                const card = document.createElement('div');
                card.className = 'card';
                card.setAttribute('data-semester', i);
                
                card.innerHTML = `
                    <h3>Semester ${i}</h3>
                    <p>View Papers</p>
                `;
                
                // Click listener for each individual semester
                card.addEventListener('click', () => {
                    handleSemesterClick(i);
                });
                
                gridContainer.appendChild(card);
            }

            // Consolidated navigation logic
           function handleSemesterClick(semesterNum) {
    if (semesterNum === 1) {
        window.location.href = 'semester1.html'; 
    } else if (semesterNum === 2) {
        window.location.href = 'semester2.html';
    } else if (semesterNum === 3) {
        window.location.href = 'semester3.html';
    } else {
        alert(`Loading question papers for Semester ${semesterNum}...`);
    }
}

            document.getElementById('donateBtn').addEventListener('click', () => {
                alert('Thank you for your support! Redirecting to donation page...');
            });

            document.getElementById('submitBtn').addEventListener('click', () => {
                alert('Thank you for contributing! Opening submission form...');
            });
        });
    </script>
</body>
</html>
