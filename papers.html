<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Available Papers - UPES PYQ Archive</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- PDF.js CDN Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>

    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: rgba(255, 255, 255, 0.02);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-primary: #f3f4f6;
            --text-secondary: #9ca3af;
            --accent-primary: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.25);
            --back-btn-bg: rgba(255, 255, 255, 0.05);
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        body::before, body::after {
            content: ''; position: absolute; width: 350px; height: 350px; border-radius: 50%;
            background: var(--accent-primary); filter: blur(160px); opacity: 0.1; z-index: -1;
        }
        body::before { top: -50px; left: -50px; }
        body::after { bottom: 100px; right: -50px; }

        .container {
            width: 100%; max-width: 1200px; padding: 40px 24px; text-align: center;
            flex-grow: 1; display: flex; flex-direction: column; justify-content: center;
        }

        header { margin-bottom: 40px; }

        h1 {
            font-size: 2.3rem; font-weight: 700; letter-spacing: -0.03em; margin-bottom: 8px;
            background: linear-gradient(135deg, #ffffff 0%, #a5b4fc 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .subtitle { font-size: 1rem; color: var(--text-secondary); text-transform: capitalize; }

        .carousel-wrapper { position: relative; width: 100%; margin-bottom: 48px; }

        .papers-carousel {
            display: flex; gap: 24px; width: 100%; overflow-x: auto; scroll-behavior: smooth;
            padding: 20px 8px; scrollbar-width: thin; scrollbar-color: var(--card-border) transparent;
        }

        .papers-carousel::-webkit-scrollbar { height: 6px; }
        .papers-carousel::-webkit-scrollbar-track { background: transparent; }
        .papers-carousel::-webkit-scrollbar-thumb { background: var(--card-border); border-radius: 10px; }

        .paper-card {
            flex: 0 0 240px; height: 330px; background-color: var(--card-bg); border: 1px solid var(--card-border);
            border-radius: 18px; position: relative; overflow: hidden; cursor: pointer; transition: var(--transition);
            display: flex; flex-direction: column; justify-content: flex-end; text-decoration: none;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.4); background-size: cover; background-position: top center; background-repeat: no-repeat;
        }

        .paper-card::before {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(to top, rgba(11, 15, 25, 0.95) 0%, rgba(11, 15, 25, 0.6) 40%, rgba(11, 15, 25, 0.2) 100%);
            z-index: 1; transition: var(--transition);
        }

        .card-details { position: relative; z-index: 2; padding: 20px; text-align: left; transition: var(--transition); }
        .card-details h3 { font-size: 1rem; font-weight: 600; color: var(--text-primary); line-height: 1.4; margin-bottom: 6px; }
        .card-details span { font-size: 0.8rem; color: var(--accent-primary); font-weight: 500; display: flex; align-items: center; gap: 4px; }

        .paper-card:hover {
            transform: translateY(-8px) scale(1.02); border-color: var(--accent-primary);
            box-shadow: 0 15px 35px -5px var(--accent-glow), 0 0 20px 2px rgba(59, 130, 246, 0.15);
        }

        .loading-placeholder {
            position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
            color: var(--text-secondary); font-size: 0.85rem; z-index: 0;
        }

        .no-data {
            width: 100%; padding: 60px 20px; color: var(--text-secondary); font-size: 1.1rem;
            border: 1px dashed var(--card-border); border-radius: 20px; background: rgba(255, 255, 255, 0.01);
        }

        .btn-container { display: flex; justify-content: center; margin-top: 20px; }
        .btn-back {
            font-family: inherit; font-size: 0.95rem; font-weight: 600; padding: 12px 24px; border-radius: 12px;
            background-color: var(--back-btn-bg); color: var(--text-primary); border: 1px solid var(--card-border);
            cursor: pointer; transition: var(--transition); display: inline-flex; align-items: center; gap: 8px; text-decoration: none;
        }
        .btn-back:hover { background-color: rgba(255, 255, 255, 0.1); transform: translateY(-2px); border-color: var(--text-secondary); }
        footer { width: 100%; padding: 24px; text-align: center; border-top: 1px solid var(--card-border); font-size: 0.9rem; color: var(--text-secondary); }

        @media (max-width: 640px) {
            h1 { font-size: 1.8rem; }
            .paper-card { flex: 0 0 210px; height: 300px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1 id="pageHeading">Loading Papers...</h1>
            <p class="subtitle" id="pageSubtitle">Processing Parameters...</p>
        </header>

        <div class="carousel-wrapper" id="carouselWrapper">
            <main class="papers-carousel" id="papersCarousel">
                <!-- Data renders here dynamically -->
            </main>
        </div>

        <div class="btn-container">
            <a href="#" id="backBtn" class="btn-back">← Back to Categories</a>
        </div>
    </div>

    <footer><p>Made for UPES Students</p></footer>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        // Dictionary to format folder identifiers into clean UI text
        const labelFormatters = {
            "semester1": "Semester 1", "semester2": "Semester 2", "semester3": "Semester 3",
            "midsem": "Mid Semester Papers", "endsem": "End Semester Papers", "quiz": "Quiz & Class Tests",
            "aem": "Advanced Engineering Mathematics 1", "physics": "Physics for Computer Sciences",
            "c-programming": "Programming in C", "dsa": "Data Structures & Algorithms (DSA)",
            "aem2": "Advanced Engineering Mathematics 2", "python": "Python Programming",
            "de": "Digital Electronics", "dbms": "Database Management System (DBMS)",
            "dms": "Discrete Mathematical Structures", "oop": "Object-Oriented Programming (OOP)"
        };

        function formatLabel(token) {
            if (!token) return "";
            return labelFormatters[token.toLowerCase()] || token.toUpperCase();
        }

        document.addEventListener('DOMContentLoaded', async () => {
            const params = new URLSearchParams(window.location.search);
            
            // Extract URL parameters exactly matching the folder naming system
            const semParam = params.get('semester'); // e.g., "semester2"
            const subParam = params.get('subject');  // e.g., "dsa"
            const typeParam = params.get('type');    // e.g., "endsem"

            // Render clean titles on screen
            document.getElementById('pageHeading').innerText = formatLabel(subParam);
            document.getElementById('pageSubtitle').innerText = `${formatLabel(semParam)} • ${formatLabel(typeParam)}`;
            document.getElementById('backBtn').href = `subject.html?semester=${semParam}&subject=${subParam}`;

            const carouselContainer = document.getElementById('papersCarousel');

            try {
                const response = await fetch('papers.json');
                if (!response.ok) throw new Error("Could not fetch archive mapping database.");
                const database = await response.json();
                
                // Directly map using the standardized folder parameters
                const availablePapers = database[semParam]?.[subParam]?.[typeParam];
                
                if (!availablePapers || availablePapers.length === 0) {
                    showNoPapers();
                } else {
                    availablePapers.forEach((paper, index) => {
                        const card = document.createElement('a');
                        card.href = paper.file;
                        card.className = 'paper-card';
                        card.target = '_blank';
                        card.id = `card-${index}`;

                        card.innerHTML = `
                            <div class="loading-placeholder" id="loader-${index}">Rendering Preview...</div>
                            <div class="card-details">
                                <h3>${paper.title}</h3>
                                <span>Open PDF ➔</span>
                            </div>
                        `;
                        
                        carouselContainer.appendChild(card);
                        generatePDFThumbnail(paper.file, index);
                    });
                }
            } catch (error) {
                console.error("Lookup Failure Error:", error);
                showNoPapers();
            }
        });

        async function generatePDFThumbnail(pdfUrl, cardIndex) {
            const loader = document.getElementById(`loader-${cardIndex}`);
            const card = document.getElementById(`card-${cardIndex}`);

            try {
                const loadingTask = pdfjsLib.getDocument(pdfUrl);
                const pdf = await loadingTask.promise;
                const page = await pdf.getPage(1);
                
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                
                const viewport = page.getViewport({ scale: 1.0 });
                canvas.height = viewport.height;
                canvas.width = viewport.width;

                await page.render({ canvasContext: ctx, viewport: viewport }).promise;
                const imageUrl = canvas.toDataURL('image/jpeg', 0.85);

                card.style.backgroundImage = `url('${imageUrl}')`;
                if(loader) loader.style.display = 'none';

            } catch (error) {
                console.warn(`Local sandbox container restriction handled on card ${cardIndex}. Fallback layout injected.`);
                if(loader) {
                    loader.innerHTML = `
                        <div style="text-align:center; opacity: 0.15; transform: translateY(-20px);">
                            <svg width="64" height="64" fill="currentColor" viewBox="0 0 16 16">
                                <path d="M14 4.5V14a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V2a2 2 0 0 1 2-2h5.5L14 4.5zm-3 0A1.5 1.5 0 0 1 9.5 3V1H4a1 1 0 0 0-1 1v12a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1V4.5h-2z"/>
                            </svg>
                        </div>
                    `;
                    card.style.background = 'linear-gradient(135deg, rgba(59, 130, 246, 0.1) 0%, rgba(11, 15, 25, 0.6) 100%)';
                }
            }
        }

        function showNoPapers() {
            document.getElementById('carouselWrapper').innerHTML = `<div class="no-data">No papers uploaded yet.</div>`;
        }
    </script>
</body>
</html>
